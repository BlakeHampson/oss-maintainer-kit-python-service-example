# Optional workflow:
# - Starting point for service-oriented CI in a Python repo
# - Intentionally conservative: edit the commands to match your dependency and test setup
# - Starter defaults auto-detect uv, requirements.txt, and editable pyproject installs
# - Safe default behavior: if no Python project files are present, it exits successfully and tells you why
name: Service smoke checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  INSTALL_COMMAND: ""
  TEST_COMMAND: ""
  SMOKE_COMMAND: ""

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run tests and smoke commands
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f pyproject.toml ] && [ ! -f requirements.txt ]; then
            echo "No pyproject.toml or requirements.txt found. This template is meant for a real Python service repo."
            echo "Keep, edit, or remove .github/workflows/ci-smoke.yml as needed."
            exit 0
          fi

          detected_shape="editable"
          detected_install="python -m pip install -e ."
          detected_test="python -m pytest"

          if [ -f uv.lock ]; then
            detected_shape="uv"
            detected_install="python -m pip install uv && uv sync --frozen"
            detected_test="uv run pytest"
          elif [ -f requirements.txt ] && [ -f requirements-dev.txt ]; then
            detected_shape="requirements"
            detected_install="python -m pip install -r requirements.txt && python -m pip install -r requirements-dev.txt"
            detected_test="python -m pytest"
          elif [ -f requirements.txt ]; then
            detected_shape="requirements"
            detected_install="python -m pip install -r requirements.txt"
            detected_test="python -m pytest"
          fi

          install_command="${INSTALL_COMMAND:-$detected_install}"
          test_command="${TEST_COMMAND:-$detected_test}"

          python -m pip install --upgrade pip

          echo "Detected starter defaults for: $detected_shape"
          echo "Edit INSTALL_COMMAND, TEST_COMMAND, and SMOKE_COMMAND when your repo needs different behavior."
          echo "Current values:"
          echo "  INSTALL_COMMAND=$install_command"
          echo "  TEST_COMMAND=$test_command"
          echo "  SMOKE_COMMAND=${SMOKE_COMMAND:-<empty>}"

          eval "$install_command"
          eval "$test_command"

          if [ -z "${SMOKE_COMMAND}" ]; then
            echo "SMOKE_COMMAND is empty. Add one when you know the endpoint, worker, or job that should never break silently."
            exit 0
          fi

          eval "$SMOKE_COMMAND"
