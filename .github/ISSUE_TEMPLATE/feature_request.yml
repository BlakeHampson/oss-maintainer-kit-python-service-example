name: Feature request
description: Suggest an improvement. Rough notes are fine; you do not need a polished spec.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to get done?
      description: Start with the job you want the project to help you do.
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: What is missing or frustrating today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What change would help?
      description: Rough notes are enough. Screenshots, links, and examples are welcome.
  - type: textarea
    id: success
    attributes:
      label: How would we know this was worth shipping?
